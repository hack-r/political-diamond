<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A New "World's Smallest Political Quiz"</title>

  <!-- Favicon: American flag emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇺🇸</text></svg>">

  <!-- SEO -->
  <meta name="description" content="Take the World's Smallest Political Quiz and discover where you fall on the political diamond chart. Answer 10 questions on freedom and political change to find your position.">
  <meta name="keywords" content="political quiz, political diamond, libertarian, progressive, conservative, political spectrum, freedom score, political compass">

  <!-- Open Graph / Social Preview -->

  <meta name="twitter:title" content="A New &ldquo;World&rsquo;s Smallest Political Quiz&rdquo;">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    h1 {
      font-size: 1.7rem;
      text-align: center;
      color: #c9a84c;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.35);
      max-width: 700px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 2rem;
      font-style: italic;
      font-size: 0.95rem;
    }

    /* ── Quiz section ── */
    #quiz-section {
      width: 100%;
      max-width: 700px;
      transition: opacity 0.8s ease;
    }

    #quiz-section.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .progress-bar {
      width: 100%;
      height: 5px;
      background: #0f3460;
      border-radius: 3px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #c9a84c;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .question-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
    }

    .question-number {
      font-size: 0.75rem;
      color: #c9a84c;
      font-weight: bold;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .question-text {
      font-size: 0.97rem;
      line-height: 1.55;
      color: #e0e0e0;
      margin-bottom: 0.9rem;
    }

    .button-group {
      display: flex;
      gap: 0.75rem;
    }

    .answer-btn {
      flex: 1;
      padding: 0.45rem 0.8rem;
      border: 2px solid #0f3460;
      background: transparent;
      color: #e0e0e0;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.88rem;
      font-family: 'Georgia', serif;
      transition: border-color 0.18s, color 0.18s, background 0.18s;
    }

    .answer-btn:hover {
      border-color: #c9a84c;
      color: #c9a84c;
    }

    .answer-btn.selected-true {
      background: #1a4a6e;
      border-color: #3498db;
      color: #fff;
    }

    .answer-btn.selected-false {
      background: #3d1a52;
      border-color: #9b59b6;
      color: #fff;
    }

    #submit-btn {
      display: none;
      margin: 1.8rem auto 0;
      padding: 0.75rem 2.8rem;
      background: #c9a84c;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Georgia', serif;
      transition: background 0.2s, transform 0.15s;
    }

    #submit-btn:hover {
      background: #e8c56a;
      transform: scale(1.03);
    }

    /* ── Chart section ── */
    #chart-section {
      width: 100%;
      max-width: 560px;
      opacity: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: opacity 0.9s ease;
    }

    #chart-section.visible {
      display: flex;
    }

    #chart-section.fade-in {
      opacity: 1;
    }

    .chart-title {
      font-size: 1.25rem;
      color: #c9a84c;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .chart-wrapper {
      position: relative;
      width: 100%;
      max-width: 520px;
    }

    #chart-bg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    #chart-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .scores-display {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
    }

    .scores-display span {
      color: #c9a84c;
      font-weight: bold;
    }

    /* ── Chart action buttons ── */
    .chart-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }

    .chart-actions button {
      padding: 0.55rem 1.4rem;
      background: transparent;
      color: #c9a84c;
      border: 2px solid #c9a84c;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: 'Georgia', serif;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }

    .chart-actions button:hover:not(:disabled) {
      background: #c9a84c;
      color: #1a1a2e;
      transform: scale(1.03);
    }

    .chart-actions button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.3rem; }
      .question-card { padding: 1rem; }
    }
  </style>
</head>
<body>

  <h1>A New &ldquo;World&rsquo;s Smallest Political Quiz&rdquo;</h1>
  <p class="subtitle">Answer all 10 questions honestly to see where you fall on the political chart.</p>

  <div id="quiz-section">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div id="questions-container"></div>
    <button id="submit-btn" onclick="showResults()">See My Results &rarr;</button>
  </div>

  <div id="chart-section">
    <div class="chart-title">Your Political Position</div>
    <div class="chart-wrapper">
      <img id="chart-bg" src="https://github.com/user-attachments/assets/8eb2211e-b6ba-47c3-b20f-5d1e9ec3e001" alt="">
      <svg id="chart-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Political position chart"></svg>
    </div>
    <div class="scores-display" id="scores-display"></div>
    <div class="chart-actions">
      <button id="download-btn" onclick="downloadChart()">&#11015; Download Chart</button>
      <button id="share-btn" onclick="shareChart()">&#8599; Share</button>
    </div>
  </div>

  <script>
    // ── Questions ────────────────────────────────────────────────────────────
    // axis: 'y' = freedom (8 qs), 'x' = speed-of-change (2 qs)
    // inverted: true  → answering FALSE earns 1 point
    // inverted: false → answering TRUE  earns 1 point
    var QUESTIONS = [
      {
        id: 1,
        text: "Development or use of AI should be regulated by the government.",
        axis: 'y',
        inverted: true
      },
      {
        id: 2,
        text: "The government has a right to conduct a military draft if the need is sufficiently great.",
        axis: 'y',
        inverted: true
      },
      {
        id: 3,
        text: "Privacy is a prerequisite of freedom, especially in an age of high social control and great information asymmetries.",
        axis: 'y',
        inverted: false
      },
      {
        id: 4,
        text: "All drugs should be legal.",
        axis: 'y',
        inverted: false
      },
      {
        id: 5,
        text: "A group can have rights to an individual if they are deemed to be the individual's stakeholder.",
        axis: 'y',
        inverted: true
      },
      {
        id: 6,
        text: "Most businesses should be required to have Human Resources departments.",
        axis: 'y',
        inverted: true
      },
      {
        id: 7,
        text: "Self-determination is an important American principal, meaning a right to make your own choices free of systematic social pressure, government intervention, or conspiracy.",
        axis: 'y',
        inverted: false
      },
      {
        id: 8,
        text: "It should be illegal to burn the American flag.",
        axis: 'y',
        inverted: true
      },
      {
        id: 9,
        text: "Radical political change in your lifetime is important.",
        axis: 'x',
        inverted: true
      },
      {
        id: 10,
        text: "Overall, the way things are now is mostly okay.",
        axis: 'x',
        inverted: false
      }
    ];

    // Shuffle in place (Fisher-Yates)
    var shuffled = QUESTIONS.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
    }

    var answers = {}; // { questionId: true|false }

    // ── Build quiz DOM ────────────────────────────────────────────────────────
    function buildQuiz() {
      var container = document.getElementById('questions-container');
      shuffled.forEach(function (q, index) {
        var card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML =
          '<div class="question-number">Question ' + (index + 1) + ' of ' + shuffled.length + '</div>' +
          '<div class="question-text">' + escapeHtml(q.text) + '</div>' +
          '<div class="button-group">' +
          '<button class="answer-btn" data-qid="' + q.id + '" data-val="true">True</button>' +
          '<button class="answer-btn" data-qid="' + q.id + '" data-val="false">False</button>' +
          '</div>';
        container.appendChild(card);
      });

      // Single delegated click listener
      container.addEventListener('click', function (e) {
        var btn = e.target.closest('.answer-btn');
        if (!btn) return;
        var qid = parseInt(btn.dataset.qid, 10);
        var val = btn.dataset.val === 'true';
        answers[qid] = val;

        var group = btn.closest('.button-group');
        group.querySelectorAll('.answer-btn').forEach(function (b) {
          b.classList.remove('selected-true', 'selected-false');
        });
        btn.classList.add(val ? 'selected-true' : 'selected-false');

        updateProgress();
      });
    }

    function updateProgress() {
      var answered = Object.keys(answers).length;
      var pct = (answered / QUESTIONS.length) * 100;
      document.getElementById('progress-fill').style.width = pct + '%';
      if (answered === QUESTIONS.length) {
        document.getElementById('submit-btn').style.display = 'block';
      }
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ── Scoring ───────────────────────────────────────────────────────────────
    // Y axis: 0–8  (freedom score); 4 = midpoint
    // X axis: 0–2  (status-quo preference); 1 = center, 2 = right
    function calculateScores() {
      var yScore = 0, xScore = 0;
      QUESTIONS.forEach(function (q) {
        var userAnswer = answers[q.id]; // true or false
        var earnedPoint = q.inverted ? !userAnswer : userAnswer;
        if (earnedPoint) {
          if (q.axis === 'y') yScore++;
          else xScore++;
        }
      });
      return { xScore: xScore, yScore: yScore };
    }

    // ── Transition ────────────────────────────────────────────────────────────
    function showResults() {
      var scores = calculateScores();

      var quizSection = document.getElementById('quiz-section');
      quizSection.classList.add('fade-out');

      setTimeout(function () {
        quizSection.style.display = 'none';

        buildChart(scores.xScore, scores.yScore);

        var chartSection = document.getElementById('chart-section');
        chartSection.classList.add('visible');

        // Trigger reflow so transition fires
        void chartSection.offsetWidth;
        chartSection.classList.add('fade-in');

        document.getElementById('scores-display').innerHTML =
          'Freedom Score: <span>' + scores.yScore + ' / 8</span>' +
          '&nbsp;&nbsp;|&nbsp;&nbsp;' +
          'Status-Quo Score: <span>' + scores.xScore + ' / 2</span>';
      }, 820);
    }

    // ── Chart ─────────────────────────────────────────────────────────────────
    function buildChart(xScore, yScore) {
      var svg = document.getElementById('chart-svg');

      // The background image has a border/label area to account for:
      //   ignore leftmost 10%, bottommost 10%, rightmost 3% of the image.
      // The remaining inner rectangle is the active chart area.
      // Coordinates below are expressed as percentages of the image dimensions,
      // matching the SVG viewBox "0 0 100 100".
      var plotLeft   = 10;   // % from left edge
      var plotRight  = 97;   // % from left edge (= ignore rightmost 3%)
      var plotTop    =  0;   // % from top edge  (no top offset)
      var plotBottom = 90;   // % from top edge  (= ignore bottommost 10%)

      // Map scores to SVG % coordinates
      // xScore 0–2: 0 = left (pro-change), 2 = right (resistance to change)
      // yScore 0–8: 0 = bottom (low freedom), 8 = top (high freedom)
      var dotX = plotLeft + (xScore / 2) * (plotRight - plotLeft);
      var dotY = plotBottom - (yScore / 8) * (plotBottom - plotTop);

      svg.innerHTML =
        '<defs>' +
          '<radialGradient id="dotGrad" cx="50%" cy="50%" r="50%">' +
            '<stop offset="0%" stop-color="#ff6b6b"/>' +
            '<stop offset="100%" stop-color="#c0392b"/>' +
          '</radialGradient>' +
        '</defs>' +

        // Outer glow rings
        '<circle cx="' + dotX + '" cy="' + dotY + '" r="3"   fill="#c0392b" opacity="0.18"/>' +
        '<circle cx="' + dotX + '" cy="' + dotY + '" r="2.2" fill="#c0392b" opacity="0.12"/>' +

        // Dot with pulse animation
        '<circle cx="' + dotX + '" cy="' + dotY + '" r="1.6" fill="url(#dotGrad)" stroke="#fff" stroke-width="0.35">' +
          '<animate attributeName="r"       values="1.6;2.2;1.6" dur="2.2s" repeatCount="indefinite"/>' +
          '<animate attributeName="opacity" values="1;0.85;1"    dur="2.2s" repeatCount="indefinite"/>' +
        '</circle>';
    }

    // ── Canvas export ─────────────────────────────────────────────────────────
    function buildChartCanvas(callback) {
      var bgEl  = document.getElementById('chart-bg');
      var svgEl = document.getElementById('chart-svg');
      var w = bgEl.naturalWidth  || bgEl.offsetWidth;
      var h = bgEl.naturalHeight || bgEl.offsetHeight;

      if (!w || !h) { callback(null); return; }

      var canvas = document.createElement('canvas');
      canvas.width  = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');

      var bgImg = new Image();
      bgImg.crossOrigin = 'anonymous';
      bgImg.onload = function () {
        ctx.drawImage(bgImg, 0, 0, w, h);

        var svgClone = svgEl.cloneNode(true);
        svgClone.setAttribute('width',  w);
        svgClone.setAttribute('height', h);
        if (!svgClone.getAttribute('xmlns')) {
          svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        }

        var svgStr  = new XMLSerializer().serializeToString(svgClone);
        var svgBlob = new Blob([svgStr], { type: 'image/svg+xml' });
        var svgUrl  = URL.createObjectURL(svgBlob);

        var dotImg = new Image();
        dotImg.onload = function () {
          ctx.drawImage(dotImg, 0, 0, w, h);
          URL.revokeObjectURL(svgUrl);
          callback(canvas);
        };
        dotImg.onerror = function () {
          URL.revokeObjectURL(svgUrl);
          callback(canvas);
        };
        dotImg.src = svgUrl;
      };
      bgImg.onerror = function () { callback(null); };
      bgImg.src = bgEl.src;
    }

    function downloadChart() {
      var btn = document.getElementById('download-btn');
      btn.textContent = 'Preparing\u2026';
      btn.disabled = true;

      buildChartCanvas(function (canvas) {
        btn.textContent = '\u2B07 Download Chart';
        btn.disabled = false;
        if (!canvas) { alert('Could not generate the chart image. Please try again.'); return; }

        canvas.toBlob(function (blob) {
          var url = URL.createObjectURL(blob);
          var a   = document.createElement('a');
          a.download = 'my-political-position.png';
          a.href = url;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(function () { URL.revokeObjectURL(url); }, 2000);
        }, 'image/png');
      });
    }

    function shareChart() {
      var btn = document.getElementById('share-btn');

      function flashBtn(msg) {
        var orig = btn.textContent;
        btn.textContent = msg;
        setTimeout(function () { btn.textContent = orig; }, 2500);
      }

      function copyUrlFallback() {
        var url = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function () { flashBtn('\u2713 Link Copied!'); });
        } else {
          var tmp = document.createElement('textarea');
          tmp.value = url;
          document.body.appendChild(tmp);
          tmp.select();
          try { document.execCommand('copy'); flashBtn('\u2713 Link Copied!'); } catch (e) {}
          document.body.removeChild(tmp);
        }
      }

      if (!navigator.share) { copyUrlFallback(); return; }

      btn.textContent = 'Sharing\u2026';
      btn.disabled = true;

      buildChartCanvas(function (canvas) {
        btn.textContent = '\u2197 Share';
        btn.disabled = false;

        function shareUrlOnly() {
          navigator.share({
            title: document.title,
            text: 'I took the World\u2019s Smallest Political Quiz \u2014 see where you fall too!',
            url: window.location.href
          }).catch(function () {});
        }

        if (!canvas) { shareUrlOnly(); return; }

        canvas.toBlob(function (blob) {
          var file = new File([blob], 'my-political-position.png', { type: 'image/png' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            navigator.share({
              files: [file],
              title: 'My Political Position',
              text: 'I took the World\u2019s Smallest Political Quiz!'
            }).catch(function () { shareUrlOnly(); });
          } else {
            shareUrlOnly();
          }
        }, 'image/png');
      });
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    buildQuiz();
  </script>
</body>
</html>
